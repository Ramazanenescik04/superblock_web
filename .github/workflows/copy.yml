name: Benim Depomdan İki Depoya Birden Güvenli Kopyala

on:
  push:
    branches:
      - main  # Sizin emire0403 deponuzun ana dalı master ise burayı master yapın

jobs:
  sync-to-ramazan:
    runs-on: ubuntu-latest
    steps:
    - name: Kendi Depomu Klonla (emire0403)
      uses: actions/checkout@v4.2.2

    - name: Token Kontrolü (Hata Önleyici)
      run: |
        if [ -z "${{ secrets.RAMAZAN_TOKEN }}" ]; then
          echo "❌ HATA: RAMAZAN_TOKEN bulunamadı veya boş!"
          echo "Lütfen emire0403/superblock_web deposunun Settings > Secrets > Actions kısmına tokenı ekleyin."
          exit 1
        fi

    - name: Git Kimlik Ayarlarını Yap
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"

    # --- 1. DEPO: SuperBlock Güncellemesi ---
    - name: SuperBlock Deposunu Güncelle
      env:
        TOKEN: ${{ secrets.RAMAZAN_TOKEN }}
      run: |
        git clone https://${TOKEN}@://github.com depo_1
        rsync -av --delete --exclude='.git/' --exclude='.github/' ./ depo_1/
        cd depo_1
        git add .
        if ! git diff-index --quiet HEAD; then
          git commit -m "Otomatik Güncelleme: emire0403/superblock_web deposundan kopyalandı"
          git push origin main
        else
          echo "SuperBlock deponuz zaten güncel, değişiklik yok."
        fi
        cd ..
        rm -rf depo_1

    # --- 2. DEPO: superblock_web Güncellemesi ---
    - name: superblock_web Deposunu Güncelle
      env:
        TOKEN: ${{ secrets.RAMAZAN_TOKEN }}
      run: |
        git clone https://${TOKEN}@://github.com depo_2
        rsync -av --delete --exclude='.git/' --exclude='.github/' ./ depo_2/
        cd depo_2
        git add .
        if ! git diff-index --quiet HEAD; then
          git commit -m "Otomatik Güncelleme: emire0403/superblock_web deposundan kopyalandı"
          git push origin main
        else
          echo "superblock_web deponuz zaten güncel, değişiklik yok."
        fi
        cd ..
        rm -rf depo_2
